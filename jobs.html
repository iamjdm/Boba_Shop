<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TeaZen Boba Bar Jobs</title>
		<link rel="stylesheet" href="styles/teazen.css" />
	</head>
	<body>
		<!-- wrapper -->
		<div id="wrapper">
			<!-- header -->
			<header>
				<h1><a href="index.html">TeaZen Boba Bar</a></h1>
			</header>

			<!-- nav -->
			<nav>
				<ul>
					<li><a href="index.html">Home</a></li>
					<li><a href="menu.html">Menu</a></li>
					<li><a href="events.html">Events</a></li>
					<li><a href="jobs.html">Jobs</a></li>
					<li><a href="order.html">Order</a></li>
				</ul>
			</nav>

			<!-- main -->
			<main>
				<div id="herojobs"></div>

				<h2>Jobs at TeaZen</h2>
				<p>
					Want to work at TeaZen? Fill out the form below to start your
					application. All information is required. We're looking for passionate
					tea lovers and bubble enthusiasts!
				</p>

				<!-- job application form -->
				<form
					action="https://webdevbasics.net/scripts/javajam8.php"
					method="post"
				>
					<label for="name">Name:</label>
					<input type="text" id="name" name="myName" required />

					<label for="email">Email:</label>
					<input type="email" id="email" name="myEmail" required />

					<label for="startdate">Start Date:</label>
					<input type="date" id="startdate" name="myStart" required />

					<label for="experience">Experience:</label>
					<textarea
						id="experience"
						name="myExperience"
						rows="2"
						required
					></textarea>

					<input type="submit" value="Apply Now" id="mySubmit" />
				</form>
			</main>

			<!-- footer -->
			<footer>
				Copyright &copy; TeaZen Boba Bar<br />
				<a href="mailto:info@teazenboba.com">info@teazenboba.com</a>
			</footer>
		</div>
	</body>
</html>
