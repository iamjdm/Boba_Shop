<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TeaZen Boba Bar Jobs</title>
		<link rel="stylesheet" href="styles/teazen.css" />
	</head>
	<body>
		<!-- wrapper -->
		<div id="wrapper">
			<!-- header -->
			<header>
				<h1><a href="index.html">TeaZen Boba Bar</a></h1>
			</header>

			<!-- nav -->
			<nav>
				<ul>
					<li><a href="index.html">Home</a></li>
					<li><a href="menu.html">Menu</a></li>
					<li><a href="events.html">Events</a></li>
					<li><a href="jobs.html">Jobs</a></li>
					<li><a href="order.html">Order</a></li>
				</ul>
			</nav>

			<!-- main -->
			<main>
				<div id="herojobs"></div>

				<h2>Jobs at TeaZen</h2>
				<p>
					Want to work at TeaZen? Fill out the form below to start your
					application. All information is required. We're looking for passionate
					tea lovers and bubble enthusiasts!
				</p>

				<!-- job application form -->
				<form id="jobForm">
    				<label for="positionID">Position:</label>
					<select id="positionID" name="positionID" required>
    					<option value="">Select a position</option>
					</select>

    				<label for="name">Name:</label>
    				<input type="text" id="name" name="name" required />

    				<label for="email">Email:</label>
    				<input type="email" id="email" name="email" required />

    				<label for="experience">Experience:</label>
    				<textarea
        				id="experience"
        				name="experience"
        				rows="2"
        				required
    				></textarea>

    				<input type="submit" value="Apply Now" id="mySubmit" />
				</form>

				<p id="jobMessage"></p>

				<script>
				async function loadJobPositions() {
    				try {
        				const response = await fetch("http://127.0.0.1:5000/job-positions");
        				const positions = await response.json();

        				const dropdown = document.getElementById("positionID");

        				positions.forEach(position => {
            				const option = document.createElement("option");
            				option.value = position.positionID;
            				option.textContent = position.positionTitle;
            				dropdown.appendChild(option);
        				});
    				} catch (error) {
        				console.error("Error loading job positions:", error);
    				}
				}

				loadJobPositions();

				document.getElementById("jobForm").addEventListener("submit", async function(e) {
    				e.preventDefault();

    				const formData = {
        				positionID: document.getElementById("positionID").value,
        				name: document.getElementById("name").value,
        				email: document.getElementById("email").value,
        				experience: document.getElementById("experience").value
    				};

    				try {
        				const response = await fetch("http://127.0.0.1:5000/submit-job", {
            				method: "POST",
            				headers: {
                				"Content-Type": "application/json"
            				},
            				body: JSON.stringify(formData)
        				});

        				const result = await response.json();

        				if (result.success) {
            				document.getElementById("jobMessage").textContent = result.message;
            				document.getElementById("jobForm").reset();
        				} else {
            				document.getElementById("jobMessage").textContent = "Error: " + result.error;
        				}
    				} catch (error) {
        				document.getElementById("jobMessage").textContent = "Something went wrong.";
    				}
				});
				</script>
				
				
			</main>

			<!-- footer -->
			<footer>
				Copyright &copy; TeaZen Boba Bar<br />
				<a href="mailto:info@teazenboba.com">info@teazenboba.com</a>
			</footer>
		</div>
	</body>
</html>
